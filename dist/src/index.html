<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="stylesheet" href="main.css">
  
  <title>Frontend Mentor | Order summary card</title>
</head>
<body>

  <main class="container">
    <img class="container__img" src="/images/illustration-hero.svg" alt="">
    
    <div class="summary">
      <h2 class="summary__title">Order Summary</h2>
      <h4 class="summary__info">
        You can now listen to millions of songs, audiobooks, and podcasts on any
        device anywhere you like!
      </h4>
      <div class="info">
        <div class="right">
          <div class="info__icon">
            <img src="/images/icon-music.svg" alt="">
          </div>
          <div class="info__title">
            <span class="title">Annual Plan</span>
            <span class="year">$59.99/year</span>
          </div>
        </div>
        <div class="info__btn">Change</div>
      </div>
    
      <div class="btn">
        <div class="btn__primary">Proceed to Payment</div>
        <div class="btn__cancel">Cancel Order</div>
      </div>
    </div>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">John Lois Floro</a>.
  </footer>
</body>
</html>
